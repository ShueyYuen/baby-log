<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="face" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#fde6d0"/>
      <stop offset="100%" stop-color="#f5c9a0"/>
    </linearGradient>
    <linearGradient id="cheek" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9b4b4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f9b4b4" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Face -->
  <circle cx="256" cy="272" r="155" fill="url(#face)"/>
  <!-- Hair tuft -->
  <path d="M200 140 Q220 80 260 120 Q280 70 310 130 Q320 90 340 135" fill="none" stroke="#8b6914" stroke-width="14" stroke-linecap="round"/>
  <!-- Left eye -->
  <ellipse cx="210" cy="260" rx="18" ry="22" fill="#3f3d56"/>
  <ellipse cx="216" cy="252" rx="6" ry="7" fill="#fff"/>
  <!-- Right eye -->
  <ellipse cx="302" cy="260" rx="18" ry="22" fill="#3f3d56"/>
  <ellipse cx="308" cy="252" rx="6" ry="7" fill="#fff"/>
  <!-- Cheeks -->
  <ellipse cx="170" cy="300" rx="30" ry="20" fill="url(#cheek)"/>
  <ellipse cx="342" cy="300" rx="30" ry="20" fill="url(#cheek)"/>
  <!-- Smile -->
  <path d="M222 320 Q256 355 290 320" fill="none" stroke="#d4846a" stroke-width="10" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="256" cy="290" rx="8" ry="6" fill="#e8b693"/>
</svg>
